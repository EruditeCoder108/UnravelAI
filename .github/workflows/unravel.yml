name: Unravel AST Analysis

# Runs on every PR and push to main.
# Annotates PRs with structural findings (race conditions, floating promises, etc.)
# via SARIF upload to GitHub's code scanning dashboard.
#
# Exit codes:
#   0 — no critical findings (workflow passes)
#   1 — critical findings (workflow fails, PR blocked)
#   2 — analysis error (workflow fails)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unravel:
    name: Unravel AST Analysis
    runs-on: ubuntu-latest
    permissions:
      # Required for SARIF upload to GitHub code scanning
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Unravel Analysis
        id: unravel
        # Explicitly tell npx to use the unravel-mcp package to find the 'unravel' command.
        run: |
          npx -y --package unravel-mcp unravel \
            --directory . \
            --symptom "PR diff analysis — identify race conditions, floating promises, stale closures" \
            --format sarif \
            --output unravel.sarif \
            --detail standard
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: unravel.sarif
          # Annotations appear directly on diff lines in the PR
          category: unravel-ast

      - name: Fail if critical findings
        # Re-check exit code from the analysis step
        if: steps.unravel.outcome == 'failure'
        run: |
          echo "Unravel found critical structural issues. See Security > Code Scanning for annotations."
          exit 1
