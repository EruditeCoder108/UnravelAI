<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      .bg { fill: #0d1117; }
      .grid-line { stroke: #1a2332; stroke-width: 0.5; }

      .logo-u { fill: none; stroke: #58a6ff; stroke-width: 2.5; stroke-linecap: round; }
      .logo-accent { fill: #58a6ff; }
      .logo-glow { fill: none; stroke: #58a6ff; stroke-width: 6; opacity: 0.15; }

      .title {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-weight: 700;
        font-size: 52px;
        fill: #e6edf3;
        letter-spacing: -1px;
      }
      .title-accent { fill: #58a6ff; }

      .sub {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 13px;
        fill: #7d8590;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .tag {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #3fb950;
      }
      .tag-bg { fill: #0d2119; rx: 4; }

      .scan-line {
        fill: none;
        stroke: url(#scan-grad);
        stroke-width: 1;
        opacity: 0;
        animation: scan 4s ease-in-out infinite;
      }
      @keyframes scan {
        0%   { opacity: 0; transform: translateY(-80px); }
        10%  { opacity: 0.6; }
        90%  { opacity: 0.6; }
        100% { opacity: 0; transform: translateY(80px); }
      }

      .dot {
        fill: #58a6ff;
        animation: pulse 2.5s ease-in-out infinite;
      }
      .dot:nth-child(1) { animation-delay: 0s; }
      .dot:nth-child(2) { animation-delay: 0.4s; }
      .dot:nth-child(3) { animation-delay: 0.8s; }

      @keyframes pulse {
        0%, 100% { opacity: 0.2; r: 2; }
        50% { opacity: 1; r: 3.5; }
      }

      .fade-in {
        animation: fadeIn 1.2s ease-out forwards;
        opacity: 0;
      }
      .fade-in-delay { animation-delay: 0.3s; }
      .fade-in-delay2 { animation-delay: 0.6s; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .border-line {
        stroke: #21262d;
        stroke-width: 1;
        fill: none;
      }
      .highlight-bar {
        fill: #58a6ff;
        opacity: 0.06;
        animation: shimmer 5s ease-in-out infinite;
      }
      @keyframes shimmer {
        0%, 100% { opacity: 0.04; }
        50% { opacity: 0.10; }
      }
    </style>
    <linearGradient id="scan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="160" class="bg" rx="8"/>

  <!-- Subtle grid -->
  <g opacity="0.4">
    <line x1="0" y1="40" x2="900" y2="40" class="grid-line"/>
    <line x1="0" y1="80" x2="900" y2="80" class="grid-line"/>
    <line x1="0" y1="120" x2="900" y2="120" class="grid-line"/>
    <line x1="160" y1="0" x2="160" y2="160" class="grid-line"/>
  </g>

  <!-- Highlight glow behind title -->
  <rect x="155" y="35" width="720" height="90" class="highlight-bar" rx="4"/>

  <!-- Logo mark (left) — stylized U -->
  <g transform="translate(36, 40)">
    <path d="M 0 0 L 0 50 Q 0 80 40 80 Q 80 80 80 50 L 80 0" class="logo-glow"/>
    <path d="M 10 8 L 10 50 Q 10 70 40 70 Q 70 70 70 50 L 70 8" class="logo-u"/>
    <!-- scan line inside logo -->
    <line x1="0" y1="40" x2="80" y2="40" class="scan-line"/>
    <!-- corner brackets -->
    <polyline points="0,0 0,12" style="fill:none;stroke:#58a6ff;stroke-width:2;stroke-linecap:round;opacity:0.5;"/>
    <polyline points="0,0 12,0" style="fill:none;stroke:#58a6ff;stroke-width:2;stroke-linecap:round;opacity:0.5;"/>
    <polyline points="80,0 80,12" style="fill:none;stroke:#58a6ff;stroke-width:2;stroke-linecap:round;opacity:0.5;"/>
    <polyline points="80,0 68,0" style="fill:none;stroke:#58a6ff;stroke-width:2;stroke-linecap:round;opacity:0.5;"/>
    <!-- dot indicator -->
    <circle cx="40" cy="50" r="4" class="logo-accent" opacity="0.9"/>
  </g>

  <!-- Pulsing dots (top right - activity indicators) -->
  <g transform="translate(820, 30)">
    <circle cx="0"  cy="0" r="2.5" class="dot" style="animation-delay:0s;"/>
    <circle cx="12" cy="0" r="2.5" class="dot" style="animation-delay:0.4s;"/>
    <circle cx="24" cy="0" r="2.5" class="dot" style="animation-delay:0.8s;"/>
  </g>

  <!-- Title -->
  <text x="175" y="90" class="title fade-in">
    <tspan class="title-accent">UN</tspan><tspan>RAVEL</tspan>
  </text>

  <!-- Subtitle -->
  <text x="176" y="118" class="sub fade-in fade-in-delay">AST-Enhanced AI Debugging Engine</text>

  <!-- Tag pill -->
  <g transform="translate(176, 130)" class="fade-in fade-in-delay2">
    <rect width="98" height="18" rx="3" class="tag-bg" style="fill:#0d2119;"/>
    <text x="8" y="13" class="tag">v3.3  ●  open source</text>
  </g>

  <!-- Right side — mode tags -->
  <g transform="translate(596, 46)">
    <text x="0" y="0" style="font-family:'JetBrains Mono',monospace;font-size:10px;fill:#7d8590;letter-spacing:1.5px;">ANALYSIS MODES</text>
    <rect x="0" y="12" width="54" height="20" rx="3" style="fill:#1a2332;"/>
    <text x="8" y="26" style="font-family:'JetBrains Mono',monospace;font-size:11px;fill:#f85149;">🐛 Debug</text>
    <rect x="62" y="12" width="62" height="20" rx="3" style="fill:#1a2332;"/>
    <text x="70" y="26" style="font-family:'JetBrains Mono',monospace;font-size:11px;fill:#58a6ff;">🔍 Explain</text>
    <rect x="132" y="12" width="66" height="20" rx="3" style="fill:#1a2332;"/>
    <text x="140" y="26" style="font-family:'JetBrains Mono',monospace;font-size:11px;fill:#3fb950;">🛡 Security</text>
    <text x="0" y="58" style="font-family:'JetBrains Mono',monospace;font-size:10px;fill:#7d8590;letter-spacing:1.5px;">PROVIDERS</text>
    <text x="0" y="76" style="font-family:'JetBrains Mono',monospace;font-size:11px;fill:#4d9375;">Anthropic · Google · OpenAI</text>
  </g>

  <!-- Border -->
  <rect width="898" height="158" class="border-line" rx="8" x="1" y="1"/>
</svg>
