html,body{height:100%;overflow:hidden}
body{

/* ── Header ─────────────────────────────────────────────── */
#hdr{

  border-bottom:1px solid rgba(255,255,255,0.05);

#logo{display:flex;align-items:center;gap:12px}

#logo h1{font-size:16px;font-weight:700;letter-spacing:-0.4px;color:#fff}
#logo h1 .sep{color:rgba(255,255,255,0.18);margin:0 6px;font-weight:300}
#logo h1 .sub{color:#6e7681;font-weight:400;font-size:14px}
#stats{display:flex;gap:28px;align-items:center}
.st{display:flex;flex-direction:column;align-items:flex-end;gap:1px;min-width:50px}
.st em{font-size:9px;color:#484f58;text-transform:uppercase;letter-spacing:1px;font-style:normal;font-weight:600;white-space:nowrap}
.st strong{font-size:21px;font-weight:700;line-height:1;color:#fff}
.st.r strong{color:#f85149;text-shadow:0 0 16px rgba(248,81,73,0.6)}
.st.y strong{color:#d29922;text-shadow:0 0 16px rgba(210,153,34,0.5)}
.st.g strong{color:#3fb950;text-shadow:0 0 16px rgba(63,185,80,0.4)}
.st.b strong{color:#58a6ff;text-shadow:0 0 16px rgba(88,166,255,0.4)}
.st-divider{width:1px;height:32px;background:rgba(255,255,255,0.06)}

/* ── Main layout ─────────────────────────────────────────── */
#main{display:flex;flex:1;overflow:hidden;min-height:0}
#canvas-wrap{flex:1;position:relative;overflow:hidden}
#svg{width:100%;height:100%}

/* ── Side panel ──────────────────────────────────────────── */
#panel{
  width:360px;flex-shrink:0;
  background:rgba(8,11,18,0.97);
  border-left:1px solid rgba(255,255,255,0.05);
  display:flex;flex-direction:column;overflow:hidden;
}
#panel-top{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0}

#panel-top p{font-size:12px;color:#6e7681;line-height:1.5}
#flist{flex:1;overflow-y:auto;padding:12px}
#flist::-webkit-scrollbar{width:3px}
#flist::-webkit-scrollbar-track{background:transparent}
#flist::-webkit-scrollbar-thumb{background:#21262d;border-radius:3px}
.fc{
  background:linear-gradient(135deg,rgba(22,27,34,0.6),rgba(13,17,23,0.9));
  border:1px solid rgba(255,255,255,0.05);
  border-left:3px solid transparent;
  border-radius:0 10px 10px 0;
  padding:13px 14px;margin-bottom:9px;
  transition:border-color 0.2s,transform 0.2s,box-shadow 0.2s;
  cursor:default;
}
.fc.fc-high{border-left-color:#f85149}
.fc.fc-med{border-left-color:#d29922}
.fc.fc-str{border-left-color:#58a6ff}
.fc:hover{transform:translateX(3px);box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.fc-name{font-size:11px;font-weight:600;color:#c9d1d9;font-family:'SF Mono',monospace;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.fc-line{font-size:10px;color:#484f58;font-weight:400}
.fc-msg{font-size:11px;color:#8b949e;line-height:1.5;margin-bottom:8px}
.fc-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase}
.t-h{background:rgba(248,81,73,0.1);color:#f85149;border:1px solid rgba(248,81,73,0.2)}
.t-m{background:rgba(210,153,34,0.1);color:#d29922;border:1px solid rgba(210,153,34,0.2)}
.t-s{background:rgba(88,166,255,0.1);color:#58a6ff;border:1px solid rgba(88,166,255,0.2)}
.no-findings{padding:20px 4px;color:#484f58;font-size:13px;text-align:center;line-height:1.6}
.no-findings span{display:block;font-size:28px;margin-bottom:8px}

.li{display:flex;align-items:center;gap:8px;font-size:10px;color:#6e7681}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#leg-title{grid-column:1/-1;font-size:9px;font-weight:700;color:#484f58;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}

/* ── Footer ──────────────────────────────────────────────── */

#ftr a{color:#58a6ff;text-decoration:none;opacity:0.7;transition:opacity 0.2s}

/* ── Controls ────────────────────────────────────────────── */
#ctrl{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
.cbtn{
  background:rgba(8,11,18,0.88);border:1px solid rgba(255,255,255,0.09);
  color:#8b949e;padding:7px 16px;border-radius:8px;font-size:11px;font-weight:500;

}
.cbtn:hover{border-color:rgba(88,166,255,0.4);color:#58a6ff}

/* ── Tooltip ─────────────────────────────────────────────── */
#tip{
  position:fixed;background:rgba(8,11,18,0.97);border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;padding:14px;font-size:12px;pointer-events:none;
  opacity:0;transition:opacity 0.15s;max-width:280px;z-index:999;
  box-shadow:0 20px 60px rgba(0,0,0,0.8);backdrop-filter:blur(16px);

#tip h3{font-size:11px;font-weight:600;color:#fff;margin-bottom:10px;font-family:monospace;word-break:break-all;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.06)}
.tr{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.tr .tk{color:#6e7681}.tr .tv{color:#c9d1d9;font-weight:500}
.tf{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06);font-size:10px;color:#8b949e;line-height:1.6}

/* ── SVG nodes/links ─────────────────────────────────────── */
.node{cursor:pointer}
.node:hover .nr{filter:brightness(1.5)}
</style>

    .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

// Halo ring (wide glow)
nodeG.append('circle').attr('class','nh')
  .attr('r', d=>rad(d)+10)
  .attr('fill','none')
  .attr('stroke', d=>RISK[d.riskLevel])
  .attr('stroke-width', 1)
  .attr('stroke-opacity', d=>d.riskLevel>=2?0.35:0.12)
  .attr('filter', d=>'url(#gl'+d.riskLevel+')');

// Gradient filled body
nodeG.append('circle').attr('class','nb')
  .attr('r', rad)
  .attr('fill', d=>'url(#nfill'+d.riskLevel+')')
  .attr('stroke', d=>RISK[d.riskLevel])
  .attr('stroke-width', d=>d.riskLevel>=2?2:1.2)
  .attr('filter', d=>'url(#gl'+d.riskLevel+')');

// Inner bright core
nodeG.append('circle').attr('class','nc')
  .attr('r', d=>Math.max(2.5, rad(d)*0.28))
  .attr('fill', d=>RISK[d.riskLevel])
  .attr('opacity', 0.9);

// Labels — white with semi-transparent pill
const labelG = nodeG.append('g').attr('class','nl').attr('transform', d=>`translate(0,${rad(d)+14})`);
labelG.append('rect')
  .attr('rx',3).attr('ry',3)
  .attr('fill','rgba(6,9,15,0.75)')
  .attr('x',-42).attr('y',-10).attr('width',84).attr('height',14);
labelG.append('text')
  .attr('text-anchor','middle').attr('dy','0px')
  .attr('fill','#c9d1d9').attr('font-size','9.5px').attr('font-weight','500')
  .attr('font-family','monospace')
  .text(d=>d.label.length>16?d.label.slice(0,14)+'..':d.label);

// Tooltip
const tip = document.getElementById('tip');
nodeG.on('mousemove',(e,d)=>{
  tip.style.left = (e.clientX+16)+'px';
  tip.style.top  = Math.min(e.clientY-10, window.innerHeight-220)+'px';
  tip.style.opacity = '1';
  const rows = d.findings.slice(0,4).map(f=>
    `<div style="margin-top:3px;font-size:10px;color:#8b949e">• ${f.label}</div>`).join('');
  const riskLabel = ['Clean','Pattern detected','Async crossing','High-confidence'][d.riskLevel];
  const riskColor = RISK[d.riskLevel];
  tip.innerHTML = `
    <h3>${d.path}</h3>
    <div class="tr"><span class="tk">Risk</span><span class="tv" style="color:${riskColor}">${riskLabel}</span></div>
    <div class="tr"><span class="tk">Findings</span><span class="tv">${d.findings.length}</span></div>
    <div class="tr"><span class="tk">Mutation chains</span><span class="tv">${d.mutationChains}</span></div>
    ${rows.length?'<div class="tf">'+rows+'</div>':''}`;
}).on('mouseleave',()=>tip.style.opacity='0');

// Tick
sim.on('tick',()=>{
  linkEl.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeG.attr('transform',d=>`translate(${d.x},${d.y})`);
});

// Controls
let dangerMode = false;
document.getElementById('tbtn').addEventListener('click',function(){
  dangerMode = !dangerMode;
  this.textContent = dangerMode ? '◉ Show all nodes' : '⚠ Danger paths only';
  this.className = 'cbtn' + (dangerMode?' active':'');
  nodeG.transition().duration(350).style('opacity',d=>!dangerMode?1:d.riskLevel>=2?1:0.04);
  linkEl.transition().duration(350).style('opacity',d=>!dangerMode?null:d.type.startsWith('mutation')?1:0.02);
});
document.getElementById('rbtn').addEventListener('click',()=>{
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
});

// Particles — only on meaningful edges, capped for performance
function spawnParticles(){
  const cfg = [
    { type:'mutation-async', color:'#f85149', r:3, dur:1300, opacity:0.95, max:8 },
    { type:'mutation',       color:'#d29922', r:2, dur:2000, opacity:0.8,  max:6 },
  ];
  cfg.forEach(({type,color,r,dur,opacity,max})=>{
    const edgesOfType = links.filter(l=>l.type===type).slice(0,max);
    edgesOfType.forEach(l=>{
      const p = g.append('circle').attr('r',r).attr('fill',color)
        .attr('opacity',opacity).style('pointer-events','none');
      const jitter = Math.random()*500;
      function go(){
        if(!l.source.x) return setTimeout(go,500);
        p.attr('cx',l.source.x).attr('cy',l.source.y);
        p.transition().duration(dur+jitter).ease(d3.easeLinear)
         .attr('cx',l.target.x).attr('cy',l.target.y)
         .on('end',()=>setTimeout(go,500+Math.random()*700));
      }
      setTimeout(go, Math.random()*2000);
    });
  });
}
sim.on('end', spawnParticles);
setTimeout(spawnParticles, 2800);
</script>
</body>
</html>
