<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Coercion Bug</title>
    <style>
        body {
            font-family: ui-sans-serif, system-ui;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #fdf2f8;
            margin: 0;
        }

        .calculator {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            width: 300px;
        }

        .row {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            color: #4b5563;
        }

        input,
        select {
            padding: 0.5rem;
            font-size: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
        }

        button {
            background: #db2777;
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background: #be185d;
        }

        .result {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
            font-size: 1.25rem;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="calculator">
        <h2 style="margin-top:0;">Tip Calculator</h2>
        <div class="row">
            <label>Subtotal ($)</label>
            <input type="number" id="subtotal" value="50.00" step="0.01">
        </div>
        <div class="row">
            <label>Tip Percentage</label>
            <select id="tipPct">
                <option value="0.10">10%</option>
                <option value="0.15" selected>15%</option>
                <option value="0.20">20%</option>
            </select>
        </div>
        <button id="calcBtn">Calculate Total</button>
        <div class="result" id="totalResult">Total: $0.00</div>
    </div>
    <script src="script.js"></script>
</body>

</html>
