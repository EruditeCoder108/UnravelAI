<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Lifecycle Bug</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            background: #e5e7eb;
        }

        .open-btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            cursor: pointer;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        #modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }

        .close-btn {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
        }

        #log {
            margin-top: 2rem;
            background: white;
            padding: 1rem;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <h1>Modal Esc Key Viewer</h1>
    <p>Click below to open the modal. Press "Escape" to close it.</p>
    <button class="open-btn" id="openModal">Open Modal</button>

    <div id="modal-overlay">
        <div class="modal-content">
            <h2>I am a Modal</h2>
            <p>Press "Escape" on your keyboard to close me.</p>
            <button class="close-btn" id="closeModal">Close</button>
        </div>
    </div>

    <div id="log"></div>

    <script src="modal.js"></script>
</body>

</html>
