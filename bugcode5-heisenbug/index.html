<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Initializer</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            padding: 2rem;
            background: #1f2937;
            color: white;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #374151;
            padding: 2rem;
            border-radius: 8px;
        }

        .data-box {
            background: #111827;
            padding: 1rem;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            margin-bottom: 1rem;
        }

        button {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .status {
            margin-top: 1rem;
            font-weight: bold;
        }

        .correct {
            color: #10b981;
        }

        .error {
            color: #ef4444;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Dashboard Initializer</h2>
        <p>This script fetches user profile data and account settings concurrently, then merges them.</p>
        <button id="runBtn">Run Dashboard Init</button>

        <div class="status" id="statusMessage"></div>
        <div class="data-box" id="dataDisplay">Waiting to run...</div>
    </div>
    <script src="script.js"></script>
</body>

</html>
